underscores_in_headers on;
ignore_invalid_headers off;
client_header_buffer_size 64k;
large_client_header_buffers 4 64k;

log_format debug_format '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'host="$host" upstream="$upstream_addr"';

server {
    listen 80 default_server;
    server_name smcindiaonline.com smcalert.smcindiaonline.com _;
    access_log /var/log/nginx/access.log debug_format;

    # Redirect HTTP to HTTPS for specific domains
    if ($host ~* ^(smcindiaonline\.com|smcalert\.smcindiaonline\.com)$ ) {
        return 301 https://$host$request_uri;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        client_max_body_size 50M;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}

server {
    listen 443 ssl default_server;
    server_name smcindiaonline.com smcalert.smcindiaonline.com _;
    access_log /var/log/nginx/access.log debug_format;
    
    error_log /var/log/nginx/ssl_error.log info;

    ssl_certificate /etc/nginx/ssl/Bundle-wildcard_smcindiaonline_com.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard_smcindiaonline_com.key;

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirect plain HTTP on SSL port to the official hostname
    error_page 497 =307 https://$http_host$request_uri;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        client_max_body_size 50M;
    }
}
