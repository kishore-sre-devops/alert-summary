# Auto-Detecting Configuration for smclama.smcindiaonline.com
# Works with or without SSL certificates
# If certificates exist, use default-ssl.conf instead

# HTTP Server - Serves HTTP if no certificates, redirects to HTTPS if certificates exist
server {
    listen 80;
    server_name smclama.smcindiaonline.com _;
    client_max_body_size 100M;
    
    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Hide Nginx version (VAPT Fix)
    server_tokens off;
    
    # Suppress Server header from upstream (VAPT Fix - Banner Grabbing)
    proxy_hide_header Server;
    add_header Server "" always;
    
    # Disable TRACE and TRACK methods (VAPT Fix - Banner Grabbing)
    if ($request_method ~ ^(TRACE|TRACK)$ ) {
        return 405;
    }
    
    # Allow underscores in headers (needed for some custom headers)
    underscores_in_headers on;

    # Dynamic DNS resolution for Docker containers
    resolver 127.0.0.11 valid=30s;
    set $upstream_api lama_api;

    # Mobile App Download
    location /download/smclama-v1.0.53-fixed.apk {
        alias /usr/share/nginx/html/mobile_apps/smclama-v1.0.53-fixed.apk;
        add_header Content-Disposition 'attachment; filename="smclama-v1.0.53-fixed.apk"';
        default_type application/vnd.android.package-archive;
    }




    location /downloads/ {
        alias /usr/share/nginx/html/mobile_apps/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_format html;
        autoindex_localtime on;
    }

    location /download/ {
        alias /usr/share/nginx/html/mobile_apps/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_format html;
        autoindex_localtime on;
    }


    # Root location - serve React app at root level
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index index.html;

        # Prevent caching of index.html so updates are seen immediately
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ======================
    # Single API Backend
    # ======================
    location /ws/ {
        proxy_pass http://lama_api:8000;
        proxy_hide_header X-Powered-By;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400; # Keep WS open
    }

    # Handle /v1/ prefix
    location /v1/ {
        proxy_pass http://lama_api:8000;
        proxy_hide_header X-Powered-By;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Handle /api/ prefix (strips /api/ and passes to root of backend)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://lama_api:8000;
        proxy_hide_header X-Powered-By;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
