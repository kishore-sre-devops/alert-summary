# Production Configuration with SSL/HTTPS
# Use this for production: https://smclama.smcindiaonline.com
# Requires SSL certificates in ./certificates/ directory

# HTTP Server - Redirect to HTTPS
server {
    listen 80;
    server_name smclama.smcindiaonline.com;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name smclama.smcindiaonline.com;
    client_max_body_size 100M;
    
    # SSL Certificate Configuration
    # Update these paths to match your actual certificate file names
    ssl_certificate /etc/nginx/ssl/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard_smcindiaonline_com.key;
    
    # Alternative certificate file names (uncomment if using different names):
    # ssl_certificate /etc/nginx/ssl/smclama.smcindiaonline.com.crt;
    # ssl_certificate_key /etc/nginx/ssl/smclama.smcindiaonline.com.key;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Hide Nginx version (VAPT Fix)
    server_tokens off;
    
    # Suppress Server header from upstream (VAPT Fix - Banner Grabbing)
    proxy_hide_header Server;
    add_header Server "" always;

    # Disable TRACE and TRACK methods (VAPT Fix - Banner Grabbing)
    if ($request_method ~ ^(TRACE|TRACK)$ ) {
        return 405;
    }
    
    # Allow underscores in headers (needed for some custom headers)
    underscores_in_headers on;

    # Dynamic DNS resolution for Docker containers
    resolver 127.0.0.11 valid=30s;
    set $upstream_api lama_api;

    # Block source map files from being served (security)
    location ~* \.map$ {
        deny all;
        return 404;
    }

    # Mobile App Download
    location /download/smclama-v1.0.53-fixed.apk {
        alias /usr/share/nginx/html/mobile_apps/smclama-v1.0.53-fixed.apk;
        add_header Content-Disposition 'attachment; filename="smclama-v1.0.53-fixed.apk"';
        default_type application/vnd.android.package-archive;
    }

    # Technical Runbook Download
    location /download/SMC_LAMA_RUNBOOK.md {
        alias /usr/share/nginx/html/docs/SMC_LAMA_RUNBOOK.md;
        add_header Content-Disposition 'attachment; filename="SMC_LAMA_RUNBOOK.md"';
        default_type text/markdown;
    }




    location /downloads/ {
        alias /usr/share/nginx/html/mobile_apps/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_format html;
        autoindex_localtime on;
    }

    location /download/ {
        alias /usr/share/nginx/html/mobile_apps/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_format html;
        autoindex_localtime on;
    }


    # Root location - serve React app at root level
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index index.html;
        
        # Prevent caching of index.html so updates are seen immediately
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Server "" always;
        }
    }

    # ======================
    # Single API Backend
    # ======================
    location /ws/ {
        proxy_pass http://lama_api:8000;
        proxy_hide_header X-Powered-By;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400; # Keep WS open
    }

    # Handle /api/ prefix (strips /api/ and passes to root of backend)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://lama_api:8000;
        proxy_hide_header X-Powered-By;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        
        # Increase timeouts to prevent 504 Gateway Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Handle /v1/ prefix (strips /v1/ and passes to /v1/ of backend)
    # This is for requests like /v1/historical/exchange-transactions
    location /v1/ {
        proxy_pass http://lama_api:8000;
        proxy_hide_header X-Powered-By;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        
        # Increase timeouts to prevent 504 Gateway Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

