# HTTP Server Configuration (No SSL - for office server without certificates)
server {
    listen 80;
    server_name _;
    client_max_body_size 100M;
    
    # Allow underscores in headers (needed for some custom headers)
    underscores_in_headers on;

    # Root location - serve React app at root level
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # ======================
    # Single API Backend
    # ======================
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://lama_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        # Preserve Authorization header if present
        proxy_set_header Authorization $http_authorization;
        # Pass all request headers to backend
        proxy_pass_request_headers on;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

